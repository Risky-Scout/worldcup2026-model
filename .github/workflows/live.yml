name: Live Match Snapshot

on:
  schedule:
    # Every 2 minutes during match hours: 14:00–04:00 UTC (10AM–midnight ET)
    # Using */2 instead of */5 because GitHub Actions throttles low-frequency
    # crons on active repos — more trigger attempts = more actual runs.
    - cron: "*/2 14-23 * * *"
    - cron: "*/2 0-4 * * *"
  workflow_dispatch: {}

concurrency:
  group: live-snapshot
  cancel-in-progress: true

jobs:
  live-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: make install

      - name: Create .env
        run: |
          echo "BDL_API_KEY=${{ secrets.BDL_API_KEY }}" > .env
          echo "FTP_HOST=${{ secrets.FTP_HOST }}" >> .env
          echo "FTP_USER=${{ secrets.FTP_USER }}" >> .env
          echo "FTP_PASS=${{ secrets.FTP_PASS }}" >> .env

      - name: Run live snapshot
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/live_snapshot.py

      - name: Re-trigger if live matches active (self-chain)
        # During live matches, re-trigger this workflow immediately so the
        # snapshot stays fresh without depending on GitHub's cron scheduler.
        # The concurrency cancel-in-progress ensures only one run at a time.
        # Chain stops automatically when no live matches remain.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(python3 -c "
          import json, pathlib
          f = pathlib.Path('data/live/wc-live.json')
          if not f.exists():
              print('quiet')
          else:
              d = json.loads(f.read_text())
              print(d.get('status', 'quiet'))
          " 2>/dev/null || echo "quiet")
          echo "Live status: $STATUS"
          if [ "$STATUS" = "live" ]; then
            sleep 90
            gh workflow run live.yml --repo ${{ github.repository }}
            echo "Re-triggered for next update (live match active)"
          else
            echo "No live matches — chain stops here"
          fi
