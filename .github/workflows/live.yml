name: Live Match Snapshot

on:
  schedule:
    # Every 2 minutes during match hours: 14:00–04:00 UTC (10AM–midnight ET)
    # Using */2 instead of */5 because GitHub Actions throttles low-frequency
    # crons on active repos — more trigger attempts = more actual runs.
    - cron: "*/2 14-23 * * *"
    - cron: "*/2 0-4 * * *"
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: live-snapshot
  cancel-in-progress: true

jobs:
  live-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: make install

      - name: Create .env
        run: |
          echo "BDL_API_KEY=${{ secrets.BDL_API_KEY }}" > .env
          echo "FTP_HOST=${{ secrets.FTP_HOST }}" >> .env
          echo "FTP_USER=${{ secrets.FTP_USER }}" >> .env
          echo "FTP_PASS=${{ secrets.FTP_PASS }}" >> .env

      - name: Run live snapshot
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/live_snapshot.py

      - name: Regenerate Market X-Ray
        if: always()
        run: python3.10 scripts/generate_xray.py
        continue-on-error: true

      - name: Upload Market X-Ray JSON (FTP)
        if: always()
        run: python3.10 scripts/upload_xray.py
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        continue-on-error: true

      - name: Re-trigger if live or match imminent (self-chain)
        # Self-chain ensures reliable updates without depending on GitHub's cron
        # scheduler (which can skip runs by 30-60+ min under load).
        # Fires when a match is currently live OR kicks off within 90 minutes.
        # Chain stops automatically outside these windows.
        # Also dispatches pre-match.yml when a match is within 20 minutes of
        # kickoff — guaranteeing the T-3 closing odds capture fires on every
        # live cycle through the critical window (no cron gap possible).
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHAIN_INFO=$(python3 -c "
          import json, pathlib, datetime, sys

          f = pathlib.Path('data/live/latest.json')
          if not f.exists():
              print('no|no')
              sys.exit(0)

          d = json.loads(f.read_text())
          status = d.get('status', 'quiet')

          now = datetime.datetime.now(datetime.timezone.utc)
          should_chain = False
          kickoff_imminent = False  # match within 20 min of kickoff

          if status == 'live':
              should_chain = True

          for m in d.get('upcoming_today', []):
              ko_str = m.get('kickoff_utc') or m.get('kickoff_et', '')
              if not ko_str:
                  continue
              try:
                  ko = datetime.datetime.fromisoformat(ko_str.replace('Z', '+00:00'))
                  if ko.tzinfo is None:
                      ko = ko.replace(tzinfo=datetime.timezone.utc)
                  mins_until = (ko - now).total_seconds() / 60
                  if -5 <= mins_until <= 90:
                      should_chain = True
                  # Dispatch pre-match closing odds capture in the T-20 window
                  if 0 < mins_until <= 20:
                      kickoff_imminent = True
              except Exception:
                  pass

          chain = 'yes' if should_chain else 'no'
          imminent = 'yes' if kickoff_imminent else 'no'
          print(f'{chain}|{imminent}')
          " 2>/dev/null || echo "no|no")

          SHOULD_CHAIN=$(echo "$CHAIN_INFO" | cut -d'|' -f1)
          KICKOFF_IMMINENT=$(echo "$CHAIN_INFO" | cut -d'|' -f2)

          echo "Should chain: $SHOULD_CHAIN | Kickoff imminent: $KICKOFF_IMMINENT"

          # Dispatch pre-match closing odds workflow when kickoff is within 20 min.
          # pre-match.yml will sleep until T-3 and capture closing odds.
          # Running it on every live cycle through this window guarantees capture
          # regardless of cron scheduler gaps.
          if [ "$KICKOFF_IMMINENT" = "yes" ]; then
            gh workflow run pre-match.yml --repo ${{ github.repository }}
            echo "Dispatched pre-match.yml (kickoff within 20 min)"
          fi

          if [ "$SHOULD_CHAIN" = "yes" ]; then
            # Trigger immediately so the next run is queued before this one releases
            # the concurrency slot. A 90s sleep here would cause the cron (every 2 min)
            # to cancel this step before gh workflow run fires. Triggering first, then
            # sleeping briefly, ensures overlap with the new run and prevents cron from
            # becoming the sole trigger (which GitHub can delay 30-60+ min under load).
            gh workflow run live.yml --repo ${{ github.repository }}
            echo "Re-triggered (live or match imminent)"
            sleep 55
          else
            echo "No live matches and none within 90 min — chain stops"
          fi
