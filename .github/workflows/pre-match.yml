name: Pre-Match Closing Odds

# Runs every ~20 minutes during World Cup match hours (12:00–04:00 ET = 16:00–08:00 UTC).
# Each run scans for any match kicking off within the next 15 minutes.
# If found: sleeps until T-3 minutes, fetches live BDL odds, records the
# closing line in the CLV store, commits the updated records.jsonl, then
# BOOTSTRAPS the live snapshot chain by dispatching live.yml immediately.
#
# This is the guaranteed entry point for live tracking: rather than relying on
# GitHub's throttled */2 cron to fire at the exact right moment, the pre-match
# job — which already runs right before kickoff — triggers the first live run.
# The self-chain in live.yml then keeps updates coming every ~90 seconds.
#
# NOTE: GitHub Actions throttles wildcard crons (*/15) on free-tier repos to
# ~6–10×/day instead of 96×/day. Explicit minute lists (0,20,40) are honored
# much more reliably — 3 attempts/hour = coverage every ~20 min (well under 45).

on:
  schedule:
    # Every 20 minutes from 16:00–03:59 UTC to guarantee 45-min coverage
    # Uses explicit minutes (0,20,40) which GitHub honors more reliably than */20
    - cron: "0,20,40 16-23 * * *"
    - cron: "0,20,40 0-4 * * *"
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pre-match-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  pre-match:
    runs-on: ubuntu-latest
    # Must be long enough to accommodate install (~3min) + LOOKAHEAD_MIN sleep (15min) + processing (~2min)
    timeout-minutes: 25
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: make install

      - name: Create .env
        run: |
          echo "BDL_API_KEY=${{ secrets.BDL_API_KEY }}" > .env

      - name: Capture closing odds (sleeps until T-3 min if match imminent)
        # continue-on-error so a single failed market capture doesn't abort the
        # whole workflow and lose the sentinel file needed by subsequent steps.
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: python scripts/closing_odds_snapshot.py
        continue-on-error: true

      - name: Commit updated CLV records if closing odds were captured
        # Commits partial results too — partial capture is better than nothing.
        run: |
          STATUS=$(python3 -c "
          import json, pathlib
          f = pathlib.Path('data/live/pre_match_status.json')
          if not f.exists():
              print(0)
          else:
              d = json.loads(f.read_text())
              print(d.get('captured', 0))
          " 2>/dev/null || echo "0")
          echo "Closing odds captured for $STATUS match(es)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/clv/2026/records.jsonl data/live/pre_match_status.json || true
          if git diff --staged --quiet; then
            echo "No CLV changes to commit"
          else
            git commit -m "chore: closing odds captured at T-3 ($STATUS match(es)) [skip ci]"
            git pull --rebase origin main || true
            git push || true
            echo "Committed and pushed closing odds update"
          fi

      - name: Bootstrap live snapshot chain at kickoff
        # Dispatch live.yml ~3 minutes after closing odds captured (i.e. right at kickoff).
        # This guarantees the live chain starts even if GitHub throttles the */2 cron.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CAPTURED=$(python3 -c "
          import json, pathlib
          f = pathlib.Path('data/live/pre_match_status.json')
          print(json.loads(f.read_text()).get('captured', 0) if f.exists() else 0)
          " 2>/dev/null || echo "0")
          if [ "$CAPTURED" != "0" ]; then
            echo "Closing odds captured — sleeping 3 min then bootstrapping live chain..."
            sleep 180
            gh workflow run live.yml --repo ${{ github.repository }}
            echo "Live snapshot chain bootstrapped"
          else
            echo "No match captured — skipping live bootstrap"
          fi
