name: Pre-Match Closing Odds

# Runs every 15 minutes during World Cup match hours (09:00–03:00 ET = 13:00–07:00 UTC).
# Each run scans for any match kicking off within the next 15 minutes.
# If found: sleeps until T-3 minutes, fetches live BDL odds, records the
# closing line in the CLV store, and commits the updated records.jsonl.
#
# Why every 15 min vs. self-chaining:
#   - Closing odds are only needed ONCE per match (at T-3 min before kickoff).
#   - WC matches have ≥ 1 hour gaps, so the cron naturally catches every match.
#   - Self-chaining would add complexity with no benefit here.
#   - cancel-in-progress: false so two consecutive cron triggers don't cancel each
#     other when two matches kick off within the same 15-minute window.

on:
  schedule:
    # Every 15 minutes from 13:00 UTC (9 AM ET) through 07:00 UTC (3 AM ET next day)
    - cron: "*/15 13-23 * * *"
    - cron: "*/15 0-7 * * *"
  workflow_dispatch: {}

concurrency:
  group: pre-match-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  pre-match:
    runs-on: ubuntu-latest
    # Must be long enough to accommodate LOOKAHEAD_MIN (15) sleep + processing
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: make install

      - name: Create .env
        run: |
          echo "BDL_API_KEY=${{ secrets.BDL_API_KEY }}" > .env

      - name: Capture closing odds (sleeps until T-3 min if match imminent)
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: python scripts/closing_odds_snapshot.py

      - name: Commit updated CLV records if closing odds were captured
        run: |
          STATUS=$(python3 -c "
          import json, pathlib
          f = pathlib.Path('data/live/pre_match_status.json')
          if not f.exists():
              print(0)
          else:
              d = json.loads(f.read_text())
              print(d.get('captured', 0))
          " 2>/dev/null || echo "0")
          echo "Closing odds captured for $STATUS match(es)"
          if [ "$STATUS" != "0" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/clv/2026/records.jsonl data/live/pre_match_status.json || true
            git diff --staged --quiet || git commit -m "chore: closing odds captured at T-3 [skip ci]"
            git pull --rebase origin main || true
            git push || true
            echo "Committed and pushed closing odds update"
          else
            echo "No imminent matches — nothing to commit"
          fi
