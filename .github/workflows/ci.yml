name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: make install

      - name: Run unit + integration tests
        run: make test

      - name: Validate published PMF artifacts
        # Validates all committed data/published/*.json against PMF sanity checks:
        # - no impossible high-score artifacts (P(total≥9) < 1e-6)
        # - PMF sums to 1.0 within tolerance
        # - O/U probabilities monotonically decreasing
        # - derived 1X2 consistent with PMF cell sums
        # - tail_mass_exact present and non-negative
        run: make validate-published

      - name: Validate live engine
        # Checks live engine unit tests and that live_replay_2022.parquet exists
        run: make validate-live

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: make install

      - name: Lint with ruff
        run: |
          pip install ruff --quiet
          ruff check src/ scripts/ tests/ --select=E,F,W --ignore=E501,E741,W291,W293 || true

      - name: Check imports with pyright (non-blocking)
        run: |
          pip install pyright --quiet
          pyright src/wc2026/ --pythonversion 3.10 || true
