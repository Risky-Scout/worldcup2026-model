name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: python -m ruff check src/ tests/

      - name: Type check with mypy
        run: python -m mypy src/wc2026/ --ignore-missing-imports
        continue-on-error: true  # warnings only until type coverage is complete

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=wc2026 --cov-report=xml --cov-fail-under=60
        env:
          BDL_API_KEY: "mock_key_for_tests"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  acceptance:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run acceptance tests (PMF consistency)
        run: python -m pytest tests/ -v -k "acceptance" --tb=short
        env:
          BDL_API_KEY: "mock_key_for_tests"
