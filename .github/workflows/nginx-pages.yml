name: Configure NGINX Pages

# Configures wizardofodds.com (13.52.111.2) NGINX to proxy model pages
# from sportsodds.wizardofodds.com (45.79.0.107).
#
# Target URLs:
#   wizardofodds.com/sports-odds/world-cup-market-xray/
#   wizardofodds.com/sports-odds/wnba-predictions/
#   wizardofodds.com/sports-odds/wnba-distributions/
#   wizardofodds.com/sports-odds/wnba-live-edges/
#
# Required secrets:
#   SSH_PRIVATE_KEY   — deploy key for woo@45.79.0.107 (sportsodds)
#   WOO_ROOT_SSH_KEY  — root SSH key for root@13.52.111.2 (wizardofodds.com)
#
# Run modes:
#   recon   — safe read-only inspection of both servers
#   apply   — inject proxy blocks into NGINX on 13.52.111.2 + reload
#   verify  — curl all 4 URLs and report HTTP status

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "recon | apply | verify"
        required: true
        default: "recon"
        type: choice
        options:
          - recon
          - apply
          - install-pages
          - apply-sportsodds
          - verify
          - verify-sportsodds

jobs:
  configure-nginx:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -H 13.52.111.2 >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H 45.79.0.107 >> ~/.ssh/known_hosts 2>/dev/null || true

          # Deploy key for sportsodds (woo@45.79.0.107)
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Root key for wizardofodds.com (root@13.52.111.2)
          if [ -n "${{ secrets.WOO_ROOT_SSH_KEY }}" ]; then
            printf '%s\n' "${{ secrets.WOO_ROOT_SSH_KEY }}" > ~/.ssh/woo_root_key
          else
            cp ~/.ssh/deploy_key ~/.ssh/woo_root_key
          fi
          chmod 600 ~/.ssh/woo_root_key

      - name: Recon - inspect both servers
        if: inputs.mode == 'recon'
        run: |
          echo "════════════════════════════════════════"
          echo "RECON A: wizardofodds.com (13.52.111.2)"
          echo "════════════════════════════════════════"
          SSH_WORKED=false
          for USER in root woo ubuntu admin ec2-user; do
            if ssh -i ~/.ssh/woo_root_key -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
               -o BatchMode=yes "${USER}@13.52.111.2" "echo connected_as_${USER}" 2>/dev/null; then
              SSH_WORKED=true
              echo "SSH user: ${USER}@13.52.111.2"
              ssh -i ~/.ssh/woo_root_key -o StrictHostKeyChecking=no "${USER}@13.52.111.2" "
                echo '── NGINX sites-enabled ──'
                ls /etc/nginx/sites-enabled/ 2>/dev/null || ls /etc/nginx/conf.d/ 2>/dev/null
                echo '── wizardofodds.com vhost (all server blocks) ──'
                grep -n 'server_name\|listen\|root\|proxy_pass\|wnba-predictions\|location' \
                  /etc/nginx/sites-available/wizardofodds.com 2>/dev/null \
                  || grep -n 'server_name\|listen\|root\|proxy_pass\|wnba-predictions\|location' \
                     /etc/nginx/conf.d/wizardofodds.com.conf 2>/dev/null \
                  || grep -n 'server_name\|listen\|root\|proxy_pass\|location' \
                     /etc/nginx/sites-available/default 2>/dev/null | head -40
                echo '── Already applied? ──'
                grep -r 'wnba-predictions' /etc/nginx/ 2>/dev/null && echo YES || echo NO
                echo '── sudo / root check ──'
                whoami && nginx -t 2>&1 | head -3
              " 2>/dev/null
              break
            fi
          done
          if [ \"\$SSH_WORKED\" = \"false\" ]; then
            echo "SSH FAILED on 13.52.111.2 — add WOO_ROOT_SSH_KEY secret"
          fi

          echo ""
          echo "════════════════════════════════════════"
          echo "RECON B: sportsodds (45.79.0.107)"
          echo "════════════════════════════════════════"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no woo@45.79.0.107 "
            echo 'WNBA dirs:'
            ls /var/www/sportsodds/tools/odds-scanner/predictions/WNBA/ 2>/dev/null
            echo 'market-xray:'
            ls /var/www/sportsodds/tools/odds-scanner/predictions/world-cup/market-xray/ 2>/dev/null | head -5
            echo 'sportsodds WNBA Edge URL check:'
            curl -s -o /dev/null -w '%{http_code}' https://sportsodds.wizardofodds.com/tools/odds-scanner/predictions/WNBA/Pre-Game/Edge/
          "

      - name: Apply - inject proxy blocks on wizardofodds.com server
        if: inputs.mode == 'apply'
        run: |
          # Copy the apply script to wizardofodds.com server
          SSH_USER=""
          for USER in root woo ubuntu admin ec2-user; do
            if ssh -i ~/.ssh/woo_root_key -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
               -o BatchMode=yes "${USER}@13.52.111.2" "echo ok" 2>/dev/null; then
              SSH_USER="$USER"
              break
            fi
          done

          if [ -z "$SSH_USER" ]; then
            echo "ERROR: Cannot SSH to 13.52.111.2"
            echo "Add WOO_ROOT_SSH_KEY secret (root SSH key for 13.52.111.2)"
            exit 1
          fi

          echo "SSH user: $SSH_USER@13.52.111.2"

          ssh -i ~/.ssh/woo_root_key -o StrictHostKeyChecking=no "${SSH_USER}@13.52.111.2" "mkdir -p ~/woo_deploy"
          scp -i ~/.ssh/woo_root_key -o StrictHostKeyChecking=no \
            deploy/nginx/apply_nginx_proxy.py \
            "${SSH_USER}@13.52.111.2:~/woo_deploy/"

          ssh -i ~/.ssh/woo_root_key -o StrictHostKeyChecking=no "${SSH_USER}@13.52.111.2" "
            set -e
            echo '── Running apply script ──'
            python3 ~/woo_deploy/apply_nginx_proxy.py

            echo ''
            echo '── nginx -t ──'
            nginx -t 2>&1

            echo ''
            echo '── Reloading NGINX ──'
            systemctl reload nginx && echo 'NGINX reloaded' || service nginx reload && echo 'NGINX reloaded (service)'

            echo ''
            echo '── Verifying URLs ──'
            sleep 2
            for path in /sports-odds/world-cup-market-xray/ /sports-odds/wnba-predictions/ /sports-odds/wnba-distributions/ /sports-odds/wnba-live-edges/; do
              STATUS=\$(curl -s -o /dev/null -w '%{http_code}' \"https://wizardofodds.com\${path}\")
              echo \"  https://wizardofodds.com\${path} -> \${STATUS}\"
            done
          "

      - name: Install pages - password SSH to both servers
        if: inputs.mode == 'install-pages'
        run: |
          sudo apt-get install -y sshpass 2>&1 | tail -1
          PASS="${{ secrets.WOO_ROOT_SSH_PASS }}"

          echo "=== Testing root@13.52.111.2 (wizardofodds.com) ==="
          SERVER_IP=$(sshpass -p "$PASS" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=8 \
            root@13.52.111.2 "curl -s ipinfo.io/ip" 2>/dev/null || true)
          if [ -n "$SERVER_IP" ]; then
            echo "Connected! Server public IP: $SERVER_IP"
            sshpass -p "$PASS" scp \
              -o StrictHostKeyChecking=no \
              deploy/pages/install.sh root@13.52.111.2:/tmp/woo_install.sh
            sshpass -p "$PASS" ssh \
              -o StrictHostKeyChecking=no \
              root@13.52.111.2 "bash /tmp/woo_install.sh"
          else
            echo "FAILED: root@13.52.111.2 not accessible with password"
          fi

          echo ""
          echo "=== Testing root@45.79.0.107 (sportsodds) ==="
          SERVER_IP2=$(sshpass -p "$PASS" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=8 \
            root@45.79.0.107 "curl -s ipinfo.io/ip" 2>/dev/null || true)
          if [ -n "$SERVER_IP2" ]; then
            echo "Connected! Server public IP: $SERVER_IP2"
            if [ "$SERVER_IP2" = "45.79.0.107" ]; then
              echo "NOTE: This is the SPORTSODDS server — wizardofodds.com pages cannot be installed here"
            fi
          else
            echo "FAILED: root@45.79.0.107 not accessible with password"
          fi

      - name: Apply clean URLs on sportsodds (static HTML redirects, no sudo needed)
        if: inputs.mode == 'apply-sportsodds'
        run: |
          set -e
          # SCP the redirect-file creator to sportsodds web root and run it.
          # woo's home dir IS the web root (/var/www/sportsodds), so no sudo needed.
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            deploy/nginx/create_sportsodds_redirects.py \
            woo@45.79.0.107:~/create_sportsodds_redirects.py

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no woo@45.79.0.107 \
            "python3 ~/create_sportsodds_redirects.py && \
             echo '── Checking URLs ──' && \
             sleep 1 && \
             for path in /sports-odds/world-cup-market-xray/ /sports-odds/wnba-predictions/ /sports-odds/wnba-distributions/ /sports-odds/wnba-live-edges/; do \
               STATUS=\$(curl -s -o /dev/null -w '%{http_code}' \"https://sportsodds.wizardofodds.com\${path}\"); \
               echo \"  sportsodds.wizardofodds.com\${path} -> \${STATUS}\"; \
             done"

      - name: Verify clean URLs on sportsodds
        if: inputs.mode == 'verify-sportsodds'
        run: |
          echo '── sportsodds.wizardofodds.com clean URL check ──'
          for path in \
            /sports-odds/world-cup-market-xray/ \
            /sports-odds/wnba-predictions/ \
            /sports-odds/wnba-distributions/ \
            /sports-odds/wnba-live-edges/; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://sportsodds.wizardofodds.com${path}")
            [ "$STATUS" = "200" ] && echo "OK   sportsodds.wizardofodds.com${path} -> $STATUS" \
                                  || echo "ERR  sportsodds.wizardofodds.com${path} -> $STATUS"
          done

      - name: Verify - check all 4 URLs on wizardofodds.com
        if: inputs.mode == 'verify'
        run: |
          echo '── URL status ──'
          ALL_OK=true
          for path in \
            /sports-odds/world-cup-market-xray/ \
            /sports-odds/wnba-predictions/ \
            /sports-odds/wnba-distributions/ \
            /sports-odds/wnba-live-edges/; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://wizardofodds.com${path}")
            [ "$STATUS" = "200" ] && echo "OK   https://wizardofodds.com${path} -> $STATUS" \
                                  || { echo "ERR  https://wizardofodds.com${path} -> $STATUS"; ALL_OK=false; }
          done
          echo ''
          echo '── JSON data ──'
          for path in \
            /sports-odds/wnba-predictions/latest.json \
            /sports-odds/world-cup-market-xray/wc-xray.json; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://wizardofodds.com${path}")
            echo "  https://wizardofodds.com${path} -> $STATUS"
          done
          echo ''
          $ALL_OK && echo 'ALL URLS LIVE' || echo 'SOME URLS NOT READY'
