name: Configure NGINX Pages

# Adds location blocks to wizardofodds.com NGINX config so these URLs serve
# model pages directly from FTP-deployed files already on the server:
#   wizardofodds.com/sports-odds/world-cup-market-xray/
#   wizardofodds.com/sports-odds/wnba-predictions/
#   wizardofodds.com/sports-odds/wnba-distributions/
#   wizardofodds.com/sports-odds/wnba-live-edges/
#
# Run mode=recon first (safe, read-only).
# Run mode=apply after reviewing recon output.
# Run mode=verify to check URL status.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "recon=inspect server | apply=write config | verify=check URLs"
        required: true
        default: "recon"
        type: choice
        options:
          - recon
          - apply
          - verify

jobs:
  configure-nginx:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H 45.79.0.107 >> ~/.ssh/known_hosts 2>/dev/null || true
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Recon - inspect server (read-only)
        if: inputs.mode == 'recon'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no woo@45.79.0.107 "
            set -e
            echo '════════════════════════════════════════'
            echo 'PHASE 1: SERVER RECONNAISSANCE'
            echo '════════════════════════════════════════'
            echo ''
            echo '── 1. NGINX sites-enabled ──'
            ls /etc/nginx/sites-enabled/ 2>/dev/null
            echo ''
            echo '── 2. default vhost (wizardofodds.com) ──'
            cat /etc/nginx/sites-enabled/default 2>/dev/null || echo 'WARNING: no default vhost'
            echo ''
            echo '── 3. sportsodds vhost (root + server_name) ──'
            grep -E 'root|server_name|ssl_cert' /etc/nginx/sites-available/sportsodds 2>/dev/null | head -6
            echo ''
            echo '── 4. FTP file locations ──'
            echo 'market-xray:' && find /var/www/sportsodds -name 'market-xray' -type d 2>/dev/null
            echo 'WNBA Edge:' && find /var/www/sportsodds -path '*/WNBA/Pre-Game/Edge' -type d 2>/dev/null
            echo ''
            echo '── 5. WordPress check ──'
            find /var/www -name 'wp-config.php' 2>/dev/null && echo WORDPRESS_DETECTED || echo no_wordpress
            echo ''
            echo '── 6. woo sudo permissions ──'
            sudo -n -l 2>&1 | head -20 || echo no_passwordless_sudo
            echo ''
            echo '── 7. Existing model location blocks ──'
            grep -r 'wnba-predictions' /etc/nginx/ 2>/dev/null || echo none_yet
            echo ''
            echo 'RECON COMPLETE'
          "

      - name: Apply - copy scripts + attempt NGINX config update
        if: inputs.mode == 'apply'
        run: |
          # Copy the repo scripts to the server
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no woo@45.79.0.107 "mkdir -p ~/wc2026/deploy/nginx"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            deploy/nginx/location_blocks.conf \
            deploy/nginx/apply_nginx.py \
            woo@45.79.0.107:~/wc2026/deploy/nginx/
          echo "Scripts copied to server"

          # Attempt auto-apply (succeeds only if woo has passwordless sudo for nginx)
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no woo@45.79.0.107 "
            echo '════════════════════════════════════════'
            echo 'ATTEMPTING AUTO-APPLY'
            echo '════════════════════════════════════════'

            if sudo -n nginx -t 2>/dev/null; then
              echo 'sudo nginx available - applying automatically'
              sudo python3 ~/wc2026/deploy/nginx/apply_nginx.py
              if sudo nginx -t; then
                sudo systemctl reload nginx
                echo 'NGINX reloaded - verifying URLs'
                sleep 2
                for path in /sports-odds/world-cup-market-xray/ /sports-odds/wnba-predictions/ /sports-odds/wnba-distributions/ /sports-odds/wnba-live-edges/; do
                  STATUS=\$(curl -s -o /dev/null -w '%{http_code}' \"https://wizardofodds.com\${path}\" 2>/dev/null)
                  echo \"  https://wizardofodds.com\${path} -> \${STATUS}\"
                done
                echo 'SUCCESS: All model pages now live on wizardofodds.com'
              else
                echo 'ERROR: nginx -t failed - reverting'
                LATEST_BAK=\$(ls /etc/nginx/sites-available/default.bak.* 2>/dev/null | sort | tail -1)
                [ -n \"\$LATEST_BAK\" ] && sudo cp \"\$LATEST_BAK\" /etc/nginx/sites-available/default
                exit 1
              fi
            else
              echo ''
              echo 'woo does not have sudo nginx access'
              echo 'SCRIPTS ARE ON THE SERVER at ~/wc2026/deploy/nginx/'
              echo ''
              echo 'SEND THIS TO MIRO (3 commands, 2 minutes, zero downtime):'
              echo ''
              echo '  sudo python3 /home/woo/wc2026/deploy/nginx/apply_nginx.py'
              echo '  sudo nginx -t'
              echo '  sudo systemctl reload nginx'
              echo ''
              echo 'After that, these URLs will be live:'
              echo '  https://wizardofodds.com/sports-odds/world-cup-market-xray/'
              echo '  https://wizardofodds.com/sports-odds/wnba-predictions/'
              echo '  https://wizardofodds.com/sports-odds/wnba-distributions/'
              echo '  https://wizardofodds.com/sports-odds/wnba-live-edges/'
              echo ''
              echo 'OPTIONAL for future automated deploys, Miro adds to /etc/sudoers.d/woo-nginx:'
              echo '  woo ALL=(ALL) NOPASSWD: /usr/sbin/nginx, /bin/systemctl reload nginx'
            fi
          "

      - name: Verify - check all 4 URLs
        if: inputs.mode == 'verify'
        run: |
          echo '── URL status check ──'
          all_ok=true
          for path in \
            /sports-odds/world-cup-market-xray/ \
            /sports-odds/wnba-predictions/ \
            /sports-odds/wnba-distributions/ \
            /sports-odds/wnba-live-edges/; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://wizardofodds.com${path}")
            if [ "$STATUS" = "200" ]; then
              echo "OK  https://wizardofodds.com${path} -> $STATUS"
            else
              echo "ERR https://wizardofodds.com${path} -> $STATUS"
              all_ok=false
            fi
          done
          echo ''
          echo '── JSON data check ──'
          for path in \
            /sports-odds/wnba-predictions/latest.json \
            /sports-odds/world-cup-market-xray/wc-xray.json; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://wizardofodds.com${path}")
            echo "  https://wizardofodds.com${path} -> $STATUS"
          done
          $all_ok && echo '' && echo 'ALL URLS LIVE' || echo '' && echo 'SOME URLS NOT READY'
