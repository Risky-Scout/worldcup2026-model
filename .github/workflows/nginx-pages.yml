name: Configure NGINX Pages

# Adds location blocks to wizardofodds.com NGINX config so these URLs serve
# model pages directly from FTP-deployed files already on the server:
#   wizardofodds.com/sports-odds/world-cup-market-xray/
#   wizardofodds.com/sports-odds/wnba-predictions/
#   wizardofodds.com/sports-odds/wnba-distributions/
#   wizardofodds.com/sports-odds/wnba-live-edges/
#
# Run mode=recon first (safe, read-only).
# Run mode=apply after reviewing recon output.
# Run mode=verify to check URL status.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "recon=inspect server | apply=write config | verify=check URLs"
        required: true
        default: "recon"
        type: choice
        options:
          - recon
          - apply
          - verify

jobs:
  configure-nginx:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # wizardofodds.com is on 13.52.111.2 (AWS); sportsodds is on 45.79.0.107 (Linode)
          ssh-keyscan -H 13.52.111.2 >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H 45.79.0.107 >> ~/.ssh/known_hosts 2>/dev/null || true
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Also try WOO_SSH_KEY if set (separate key for wizardofodds.com server)
          if [ -n "${{ secrets.WOO_SSH_KEY }}" ]; then
            printf '%s\n' "${{ secrets.WOO_SSH_KEY }}" > ~/.ssh/woo_key
            chmod 600 ~/.ssh/woo_key
          else
            cp ~/.ssh/deploy_key ~/.ssh/woo_key
          fi

      - name: Recon - inspect BOTH servers
        if: inputs.mode == 'recon'
        run: |
          echo '════════════════════════════════════════'
          echo 'RECON A: wizardofodds.com (13.52.111.2)'
          echo '════════════════════════════════════════'
          # Try common usernames for the AWS server
          WOO_HOST=13.52.111.2
          SSH_WORKED=false
          for USER in woo ubuntu admin ec2-user root; do
            if ssh -i ~/.ssh/woo_key -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
               -o BatchMode=yes "${USER}@${WOO_HOST}" "echo connected_as_${USER}" 2>/dev/null; then
              SSH_WORKED=true
              echo "SSH works as: ${USER}@${WOO_HOST}"
              ssh -i ~/.ssh/woo_key -o StrictHostKeyChecking=no "${USER}@${WOO_HOST}" "
                echo '── NGINX config ──'
                ls /etc/nginx/sites-enabled/ 2>/dev/null || ls /etc/nginx/conf.d/ 2>/dev/null
                echo '── wizardofodds.com vhost ──'
                grep -r 'wizardofodds\|server_name\|root\|listen 443' /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null | head -20
                echo '── web root ──'
                ls /var/www/ 2>/dev/null
                echo '── sudo permissions ──'
                sudo -n -l 2>&1 | head -10 || echo no_passwordless_sudo
                echo '── existing model blocks ──'
                grep -r 'wnba-predictions\|market-xray' /etc/nginx/ 2>/dev/null || echo none
              " 2>/dev/null
              break
            fi
          done
          if [ "$SSH_WORKED" = "false" ]; then
            echo "SSH FAILED for all usernames on 13.52.111.2"
            echo "The SSH_PRIVATE_KEY secret does not grant access to the wizardofodds.com server"
            echo "Miro needs to either:"
            echo "  a) Add the deploy key to authorized_keys on 13.52.111.2, OR"
            echo "  b) Apply the NGINX changes manually on 13.52.111.2"
          fi

          echo ''
          echo '════════════════════════════════════════'
          echo 'RECON B: sportsodds (45.79.0.107) — FTP files live here'
          echo '════════════════════════════════════════'
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no woo@45.79.0.107 "
            echo 'FTP root contents:'
            ls /var/www/sportsodds/tools/odds-scanner/predictions/ 2>/dev/null
            echo 'WNBA subdirs:'
            ls /var/www/sportsodds/tools/odds-scanner/predictions/WNBA/ 2>/dev/null
            echo 'market-xray files:'
            ls /var/www/sportsodds/tools/odds-scanner/predictions/world-cup/market-xray/ 2>/dev/null | head -5
          "

      - name: Apply - copy scripts + attempt NGINX on wizardofodds.com server
        if: inputs.mode == 'apply'
        run: |
          WOO_HOST=13.52.111.2
          SSH_USER=""

          # Find which user works on the wizardofodds.com server
          for USER in woo ubuntu admin ec2-user root; do
            if ssh -i ~/.ssh/woo_key -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
               -o BatchMode=yes "${USER}@${WOO_HOST}" "echo ok" 2>/dev/null; then
              SSH_USER="$USER"
              echo "SSH user for wizardofodds.com server: $SSH_USER"
              break
            fi
          done

          if [ -z "$SSH_USER" ]; then
            echo ""
            echo "════════════════════════════════════════"
            echo "SSH ACCESS NEEDED TO 13.52.111.2"
            echo "════════════════════════════════════════"
            echo ""
            echo "wizardofodds.com (13.52.111.2) is a DIFFERENT server from sportsodds (45.79.0.107)."
            echo "The deploy SSH key does not grant access to the wizardofodds.com server."
            echo ""
            echo "SEND THIS TO MIRO — he needs to run these commands on 13.52.111.2 (the wizardofodds.com server):"
            echo ""
            echo "Option A — Proxy (recommended, no file copying needed):"
            echo "  sudo nano /etc/nginx/sites-available/wizardofodds.com"
            echo "  # Add inside the HTTPS server { } block, before 'location / {':"
            echo ""
            cat deploy/nginx/location_blocks_proxy.conf
            echo ""
            echo "  sudo nginx -t && sudo systemctl reload nginx"
            echo ""
            echo "Option B — Grant SSH access for automated deploys:"
            echo "  On 13.52.111.2, run: echo '$(cat ~/.ssh/deploy_key.pub 2>/dev/null || ssh-keygen -y -f ~/.ssh/deploy_key)' >> ~/.ssh/authorized_keys"
            echo "  Then re-run this workflow with mode=apply"
            exit 0
          fi

          # We have SSH access — do recon then apply
          NGINX_CONF=$(ssh -i ~/.ssh/woo_key -o StrictHostKeyChecking=no "${SSH_USER}@${WOO_HOST}" "
            for f in /etc/nginx/sites-enabled/wizardofodds.com /etc/nginx/sites-available/wizardofodds.com \
                      /etc/nginx/conf.d/wizardofodds.com.conf /etc/nginx/sites-enabled/default; do
              [ -f \"\$f\" ] && echo \"\$f\" && break
            done
          ")
          echo "NGINX config: $NGINX_CONF"

          # Copy scripts to wizardofodds.com server
          ssh -i ~/.ssh/woo_key -o StrictHostKeyChecking=no "${SSH_USER}@${WOO_HOST}" "mkdir -p ~/deploy/nginx"
          scp -i ~/.ssh/woo_key -o StrictHostKeyChecking=no \
            deploy/nginx/location_blocks_proxy.conf \
            deploy/nginx/apply_nginx_proxy.py \
            "${SSH_USER}@${WOO_HOST}:~/deploy/nginx/"

          # Attempt auto-apply
          ssh -i ~/.ssh/woo_key -o StrictHostKeyChecking=no "${SSH_USER}@${WOO_HOST}" "
            if sudo -n nginx -t 2>/dev/null; then
              sudo python3 ~/deploy/nginx/apply_nginx_proxy.py
              sudo nginx -t && sudo systemctl reload nginx
              echo 'SUCCESS - NGINX reloaded'
              sleep 2
              for path in /sports-odds/world-cup-market-xray/ /sports-odds/wnba-predictions/ /sports-odds/wnba-distributions/ /sports-odds/wnba-live-edges/; do
                STATUS=\$(curl -s -o /dev/null -w '%{http_code}' \"https://wizardofodds.com\${path}\")
                echo \"  https://wizardofodds.com\${path} -> \${STATUS}\"
              done
            else
              echo 'No passwordless sudo on this server either'
              echo 'MIRO: run these 3 commands on the wizardofodds.com server (13.52.111.2):'
              echo '  sudo python3 ~/deploy/nginx/apply_nginx_proxy.py'
              echo '  sudo nginx -t'
              echo '  sudo systemctl reload nginx'
            fi
          "

      - name: Verify - check all 4 URLs
        if: inputs.mode == 'verify'
        run: |
          echo '── URL status check ──'
          all_ok=true
          for path in \
            /sports-odds/world-cup-market-xray/ \
            /sports-odds/wnba-predictions/ \
            /sports-odds/wnba-distributions/ \
            /sports-odds/wnba-live-edges/; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://wizardofodds.com${path}")
            if [ "$STATUS" = "200" ]; then
              echo "OK  https://wizardofodds.com${path} -> $STATUS"
            else
              echo "ERR https://wizardofodds.com${path} -> $STATUS"
              all_ok=false
            fi
          done
          echo ''
          echo '── JSON data check ──'
          for path in \
            /sports-odds/wnba-predictions/latest.json \
            /sports-odds/world-cup-market-xray/wc-xray.json; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://wizardofodds.com${path}")
            echo "  https://wizardofodds.com${path} -> $STATUS"
          done
          $all_ok && echo '' && echo 'ALL URLS LIVE' || echo '' && echo 'SOME URLS NOT READY'
