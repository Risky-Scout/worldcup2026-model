name: Daily Update

# Runs every day at 8:00 AM UTC (4:00 AM ET).
# Scheduled 8 hours after midnight UTC to ensure BDL has marked all
# previous-night ET games (e.g. 9 PM ET kickoffs finishing ~11:30 PM ET = 3:30 AM UTC)
# as completed before the pipeline fetches and retrains on them.
# This IS the primary pipeline — not a fallback.
# Fetches fresh BDL data, rebuilds the dataset, regenerates all predictions,
# validates artifacts, deploys to WOO, and commits updated data to the repo.

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to predict (YYYY-MM-DD, default: tomorrow ET)"
        required: false
        default: ""
      force_refetch:
        description: "Force re-fetch from BDL even if cache exists"
        required: false
        default: "false"

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "DATE=${{ github.event.inputs.date }}" >> $GITHUB_ENV
            echo "TODAY=${{ github.event.inputs.date }}" >> $GITHUB_ENV
          else
            echo "DATE=$(TZ=America/New_York date -d '+1 day' +%Y-%m-%d 2>/dev/null || date -v+1d +%Y-%m-%d)" >> $GITHUB_ENV
            echo "TODAY=$(TZ=America/New_York date +%Y-%m-%d 2>/dev/null || date +%Y-%m-%d)" >> $GITHUB_ENV
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: make install

      - name: Create .env
        run: |
          echo "BDL_API_KEY=${{ secrets.BDL_API_KEY }}" > .env
          echo "FTP_HOST=${{ secrets.FTP_HOST }}" >> .env
          echo "FTP_USER=${{ secrets.FTP_USER }}" >> .env
          echo "FTP_PASS=${{ secrets.FTP_PASS }}" >> .env
          echo "WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}" >> .env

      - name: Fetch latest BDL data
        id: fetch
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: make fetch-bdl
        continue-on-error: true

      - name: Warn on fetch failure
        if: steps.fetch.outcome != 'success'
        run: echo "::warning::BDL fetch failed — pipeline will use committed cached data"

      - name: Rebuild dataset
        if: steps.fetch.outcome == 'success'
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: make build-dataset
        continue-on-error: true

      - name: Run prediction pipeline
        id: pipeline
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: python scripts/run_real_pipeline.py

      - name: Validate published artifacts
        run: make validate-published

      - name: Upload today's predictions to WOO (FTP)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/upload_predictions.py --date $TODAY
        continue-on-error: true

      - name: Deploy HTML pages (FTP)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/deploy_html.py
        continue-on-error: true

      - name: Notify live server to reload lambdas
        run: |
          curl -sf -X GET \
            -H "X-Internal-Token: ${{ secrets.WEBHOOK_SECRET }}" \
            https://sportsodds.wizardofodds.com/api/reload-lambdas/index.php || true
        continue-on-error: true

      - name: Commit updated predictions and processed data
        run: |
          git config user.name "wc2026-bot"
          git config user.email "wc2026-bot@users.noreply.github.com"
          git add data/published/ data/clv/ data/calibration/ data/processed/ reports/ || true
          git diff --cached --quiet || \
            git commit -m "Daily update $DATE: predictions + data [skip ci]"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
