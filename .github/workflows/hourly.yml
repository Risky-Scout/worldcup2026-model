name: Hourly Refresh (Pre-Match)

# Runs every hour to keep pre-match pages fresh.
# Always runs the prediction pipeline (using cached data if BDL_API_KEY unavailable).
# Uploads today's predictions to the WOO FTP server.

on:
  schedule:
    - cron: "0 6-23 * * *"
    - cron: "0 0-5 * * *"
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: hourly-refresh
  cancel-in-progress: false

jobs:
  hourly-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: make install

      - name: Create .env
        run: |
          echo "BDL_API_KEY=${{ secrets.BDL_API_KEY }}" > .env
          echo "FTP_HOST=${{ secrets.FTP_HOST }}" >> .env
          echo "FTP_USER=${{ secrets.FTP_USER }}" >> .env
          echo "FTP_PASS=${{ secrets.FTP_PASS }}" >> .env
          echo "WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}" >> .env

      - name: Get today's date (ET)
        run: echo "DATE=$(TZ=America/New_York date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Run prediction pipeline
        id: pipeline
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/run_real_pipeline.py

      - name: Closing odds forward scan (catch imminent matches missed by pre-match.yml)
        # Runs after the main pipeline (CLV store already populated with prediction records).
        # Scans for any match kicking off in the next 15 minutes; if found, sleeps until
        # T-3 minutes then fetches live closing odds.  This is the primary safety net when
        # GitHub throttles the */15 cron in pre-match.yml (which fires only ~6-10×/day
        # instead of the expected ~84×/day).  Max sleep ≤ 12 minutes (LOOKAHEAD=15 −
        # CLOSING_BEFORE=3), so this step never adds more than ~12 min to the hourly run.
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: python scripts/closing_odds_snapshot.py
        continue-on-error: true

      - name: Closing odds fallback (catch any match that just kicked off)
        # Runs after the main pipeline so the CLV store already has prediction records.
        # Captures closing odds for any match that kicked off within the last 15 minutes
        # whose closing line wasn't captured by pre-match.yml (e.g. cron drift).
        # Skips matches that already have a closing line recorded.
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: python scripts/closing_odds_snapshot.py --fallback-window 15
        continue-on-error: true

      - name: Upload predictions to server (FTP)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/upload_predictions.py --date $DATE
        continue-on-error: true

      - name: Deploy HTML pages (FTP)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/deploy_html.py
        continue-on-error: true

      - name: Commit updated predictions and calibration
        run: |
          git config user.name "wc2026-bot"
          git config user.email "wc2026-bot@users.noreply.github.com"
          git add data/published/ data/clv/ data/calibration/ data/processed/ reports/ || true
          git diff --cached --quiet || \
            git commit -m "Hourly update $DATE: predictions [skip ci]"
          git pull --rebase origin main || true
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
