# WC2026 nginx configuration for sportsodds.wizardofodds.com
# Place at: /etc/nginx/sites-available/sportsodds
# Enable: ln -sf /etc/nginx/sites-available/sportsodds /etc/nginx/sites-enabled/sportsodds
# Test:   nginx -t
# Reload: systemctl reload nginx

# Upstream FastAPI server
upstream wc2026_api {
    server 127.0.0.1:8000;
    keepalive 8;
}

server {
    listen 80;
    server_name sportsodds.wizardofodds.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sportsodds.wizardofodds.com;

    # ── SSL — use existing certificate paths ────────────────────────────
    # Update these paths to match your actual cert location:
    ssl_certificate     /etc/letsencrypt/live/sportsodds.wizardofodds.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sportsodds.wizardofodds.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Logging ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/sportsodds.access.log;
    error_log  /var/log/nginx/sportsodds.error.log warn;

    # ── WebSocket proxy — /ws/ ───────────────────────────────────────────
    location /ws/ {
        proxy_pass http://wc2026_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # Keep WS open for up to 1 hour
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ── API proxy — /api/ and /webhook/ and /health ──────────────────────
    location ~ ^/(api|webhook|health)(/|$) {
        proxy_pass http://wc2026_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        # CORS headers (FastAPI also sets these, but belt-and-suspenders)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    }

    # ── Static files — everything else ───────────────────────────────────
    root /var/www/html;
    index index.html index.php;

    location / {
        try_files $uri $uri/ =404;
    }

    # PHP (if used for webhook_receiver.php or other scripts)
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Cache static assets aggressively
    location ~* \.(css|js|png|jpg|svg|woff2|ico)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # JSON prediction files — short cache so pages get fresh data
    location ~* \.(json)$ {
        expires 2m;
        add_header Cache-Control "public, max-age=120";
        add_header Access-Control-Allow-Origin "*";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    client_max_body_size 10M;
}
